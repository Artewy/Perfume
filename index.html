<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artewy Parfum</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <canvas id="stars"></canvas>

    <div class="container">
        <div class="profile-header">
            <img src="cat.jpg" alt="Artewy" class="profile-img" id="avatar">

            <h1>ARTEWY PARFUM | NICHE & LUXURY</h1>

            <p class="intro-text">
                Привет! Меня зовут Артём. Я развиваю свои парфюмерные сообщества в Telegram
            </p>
        </div>

        <h2 id="projects">МОИ ПРОЕКТЫ</h2>
        <div class="links-container" id="projects-container"></div>

        <h2>СОТРУДНИЧЕСТВО</h2>
        <p class="cooperation-text">
            По всем вопросам сотрудничества и рекламы обращайтесь ко мне в Telegram
        </p>
        <a href="https://t.me/Artewy" class="link-card main-contact" target="_blank">Telegram</a>

        <img src="logo_loader.png" alt="Artewy Parfum Logo" class="final-logo">

        <div class="footer">
            EST. 2026 • ARTEWY PARFUM
        </div>
    </div>

    <button id="back-to-top" aria-label="Наверх">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 19V5M5 12l7-7 7 7" />
        </svg>
    </button>

    <script src="script.js"></script>
</body>

</html>
