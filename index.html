<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artewy Parfum | Артём</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --metal-gradient: radial-gradient(circle at center, #2e2e2e, #050505 80%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-hover: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --border: rgba(255, 255, 255, 0.1);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: var(--metal-gradient);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 60px 24px;
            text-align: center;
        }

        /* Профиль */
        .profile-header {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.8s forwards;
            margin-bottom: 40px;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            filter: grayscale(100%);
            transition: var(--transition);
        }

        .profile-img:hover {
            filter: grayscale(0%);
            transform: scale(1.05);
        }

        h1 {
            /* User request: style h1 like "niche & selective" text (old subtitle) */
            font-size: 13px;
            font-weight: 300;
            color: var(--text-secondary);
            margin: 0;
            letter-spacing: 1px;
            text-transform: lowercase;
        }

        .intro-text {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 20px 0 30px;
            line-height: 1.6;
        }

        .telegram-logo-icon {
            height: 1em;
            width: auto;
            vertical-align: middle;
            fill: #0088cc;
            margin-left: 5px;
        }

        .subtitle {
            /* This is now styled as the brand's main header */
            font-size: 22px;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Новые заголовки и текст разделов */
        h2 {
            font-size: 18px;
            font-weight: 600;
            margin-top: 50px;
            margin-bottom: 20px;
            color: var(--text-main);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .cooperation-text {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Кнопки */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-main);
            text-decoration: none;
            padding: 20px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 400;
            border: 1px solid var(--border);
            transition: var(--transition);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.6s forwards;
            display: block;
        }

        /* Анимация появления кнопок проектов */
        .links-container .link-card:nth-child(1) {
            animation-delay: 0.2s;
        }

        .links-container .link-card:nth-child(2) {
            animation-delay: 0.4s;
        }

        .links-container .link-card:nth-child(3) {
            animation-delay: 0.6s;
        }

        .link-card:hover {
            background: var(--card-hover);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.02);
            letter-spacing: 1px;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Последний логотип placeholder */
        .final-logo {
            max-width: 150px;
            margin: 50px auto 20px;
            display: block;
            opacity: 0.5;
        }

        /* Футер */
        .footer {
            margin-top: 60px;
            font-size: 10px;
            color: var(--text-secondary);
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.5;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="profile-header">
            <img src="me.jpg" alt="Артём" class="profile-img">
            <h1>АРТЁМ</h1>
            <p class="intro-text">
                Привет! Меня зовут Артём. Я развиваю свои парфюмерные сообщества в Telegram
                <svg class="telegram-logo-icon" viewBox="0 0 24 24">
                    <path
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.12 7.14-.14.72-.4 1-.66 1.02-.56.06-1-.38-1.54-.74-.84-.56-1.32-.9-2.14-1.44-1-.62-.35-.96.22-1.55.15-.15 2.76-2.53 2.81-2.75.01-.03.01-.1-.01-.13-.02-.03-.06-.02-.1-.01-.04.01-1.12.72-3.17 2.1-.3.2-.56.3-.78.3-.24 0-.7-.13-1.04-.24-.4-.13-.73-.2-.7-.42.02-.12.2-.25.56-.4 2.22-.96 3.7-1.6 4.43-1.92 2.1-.9.44-1.05.44.11-.01.12-.01.24-.03.35z">
                    </path>
                </svg>
            </p>

            <p class="subtitle">ARTEMY PARFUM | NICHE & SELECTIVE</p>
        </div>

        <h2>МОИ ПРОЕКТЫ</h2>
        <div class="links-container">
            <a href="https://t.me/pb_aq" class="link-card" target="_blank">Парфам Пополам</a>
            <a href="https://t.me/pd_aa" class="link-card" target="_blank">ParfDrink</a>
            <a href="https://t.me/antifakePARF" class="link-card" target="_blank">ANTIFAKE ПАРФЮМ</a>
        </div>

        <h2>СОТРУДНИЧЕСТВО</h2>
        <p class="cooperation-text">
            По всем вопросам сотрудничества и рекламы обращайтесь ко мне в Telegram
        </p>
        <a href="https://t.me/Artewy" class="link-card" target="_blank">Telegram</a>

        <img src="logo_loader.png" alt="Artewy Parfum Logo" class="final-logo">

        <div class="footer">
            EST. 2026 • ARTEWY PARFUM
        </div>
    </div>

</body>

</html>
