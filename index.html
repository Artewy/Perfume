<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artewy Parfum | Артём</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-hover: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --border: rgba(255, 255, 255, 0.1);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 60px 24px;
            text-align: center;
        }

        /* Аватар */
        .profile-header {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.8s forwards;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            filter: grayscale(100%);
            transition: var(--transition);
        }

        .profile-img:hover {
            filter: grayscale(0%);
            transform: scale(1.05);
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 3px;
            margin: 0;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin: 12px 0 40px;
            letter-spacing: 1px;
            text-transform: lowercase;
        }

        /* Ссылки */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-main);
            text-decoration: none;
            padding: 20px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 400;
            border: 1px solid var(--border);
            transition: var(--transition);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.6s forwards;
        }

        /* Поочередная анимация появления кнопок */
        .link-card:nth-child(1) {
            animation-delay: 0.2s;
        }

        .link-card:nth-child(2) {
            animation-delay: 0.4s;
        }

        .link-card:nth-child(3) {
            animation-delay: 0.6s;
        }

        .link-card:hover {
            background: var(--card-hover);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.02);
            letter-spacing: 1px;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer {
            margin-top: 60px;
            font-size: 10px;
            color: var(--text-secondary);
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.5;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="profile-header">
            <img src="me.jpg" alt="Артём" class="profile-img">
            <h1>Артём</h1>
            <p class="subtitle">Artewy Parfum | Niche & Selective</p>
        </div>

        <div class="links-container">
            <a href="https://t.me/pb_aq" class="link-card" target="_blank">Парфам Пополам</a>
            <a href="https://t.me/pd_aa" class="link-card" target="_blank">ParfDrink</a>
            <a href="https://t.me/antifakePARF" class="link-card" target="_blank">ANTIFAKE ПАРФЮМ</a>
        </div>

        <div class="footer">
            EST. 2026 • ARTEWY PARFUM
        </div>
    </div>

</body>

</html>
